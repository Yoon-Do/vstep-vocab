<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VSTEP Mindmap</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Be Vietnam Pro","SF Pro Text","Helvetica Neue","Segoe UI",sans-serif;
      background: linear-gradient(180deg,#f8f3ea 0%,#efe7dc 100%);
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }
    #topbar {
      display: flex; align-items: center; gap: 12px; padding: 10px 20px;
      background: rgba(255,252,246,0.96); border-bottom: 1px solid rgba(53,37,28,0.12);
      flex-shrink: 0; flex-wrap: wrap;
    }
    #topbar h1 { font-size: 16px; font-weight: 700; color: #1f1b18; }
    #topbar .muted { font-size: 12px; color: #6f655d; }
    .back-btn {
      text-decoration: none; font-size: 13px; padding: 5px 12px;
      border: 1px solid rgba(53,37,28,0.2); border-radius: 8px;
      color: #1f1b18; background: transparent; white-space: nowrap;
    }
    .back-btn:hover { background: rgba(163,75,42,0.08); }
    .filter-chips { display: flex; gap: 6px; margin-left: auto; flex-wrap: wrap; }
    .chip {
      font-size: 12px; padding: 4px 10px; border: 1px solid rgba(53,37,28,0.2);
      border-radius: 20px; cursor: pointer; background: transparent; color: #1f1b18;
      font-family: inherit; transition: all 0.15s;
    }
    .chip.active { background: #a34b2a; color: white; border-color: transparent; }

    #mm-container {
      flex: 1;
      display: flex;
      position: relative;
      overflow: hidden;
    }

    /* Divider trung tâm */
    #center-label {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      background: #1f1b18;
      color: white;
      border-radius: 50%;
      width: 80px; height: 80px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; text-align: center;
      line-height: 1.3;
      box-shadow: 0 4px 20px rgba(31,27,24,0.3);
      pointer-events: none;
    }
    #center-label .sub { font-size: 9px; opacity: 0.6; font-weight: 400; }

    .mm-half {
      flex: 1;
      position: relative;
    }
    .mm-half svg { width: 100%; height: 100%; }

    /* Bên trái: flip ngang để cây mọc sang trái */
    #mm-left svg {
      transform: scaleX(-1);
    }
    /* Flip lại text trong svg trái */
    #mm-left svg text {
      transform: scaleX(-1);
    }

    .hint {
      position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
      font-size: 12px; color: #6f655d;
      background: rgba(255,252,246,0.9); padding: 4px 14px;
      border-radius: 20px; border: 1px solid rgba(53,37,28,0.1);
      pointer-events: none; white-space: nowrap; z-index: 5;
    }
  </style>
</head>
<body>

<div id="topbar">
  <a class="back-btn" href="index.html">← Trang chính</a>
  <div>
    <h1>🗺 VSTEP Mindmap</h1>
    <div class="muted">Click node để mở/đóng · Scroll zoom · Kéo di chuyển · Click từ để nghe</div>
  </div>
  <div class="filter-chips">
    <button class="chip active" data-filter="all">Tất cả</button>
    <button class="chip" data-filter="priority">Ưu tiên cao</button>
    <button class="chip" data-filter="mastered">Đã thuộc</button>
    <button class="chip" data-filter="favorites">Đánh dấu</button>
  </div>
</div>

<div id="mm-container">
  <div class="mm-half" id="mm-left"><svg id="markmap-left"></svg></div>
  <div id="center-label">
    <span>📚 VSTEP</span>
    <span class="sub">Vocabulary</span>
  </div>
  <div class="mm-half" id="mm-right"><svg id="markmap-right"></svg></div>
  <div class="hint">Click node để mở/đóng · Scroll zoom · Kéo để di chuyển</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/markmap-autoloader@0.18.12/dist/index.js"></script>
<script src="./vocab-data.js"></script>
<script>
const storage = {
  get(key, fb) { try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : fb; } catch { return fb; } }
};
const mastered = new Set(storage.get("vstep-mastered", []));
const favorites = new Set(storage.get("vstep-favorites", []));
function keyFor(w, id) { return `${id}::${w.en.toLowerCase()}`; }

const HIGH_VALUE = new Set([
  "infrastructure","destination","public transport","high cost of living","economic hub",
  "career opportunity","constructive feedback","specialized knowledge","tuition fee",
  "global warming","greenhouse gas emissions","biodiversity","climate change",
  "environmental degradation","renewable energy","carbon emissions","deforestation",
  "privacy concern","personal data","discrimination","raise awareness"
]);
function score(w, id) {
  if (["grammar","linking-words"].includes(id)) return 10;
  let s = 0;
  if (HIGH_VALUE.has(w.en.toLowerCase())) s += 6;
  if (w.type === "phrase") s += 2;
  return s;
}

let currentFilter = "all";
let mmLeft = null, mmRight = null;

function filtered(theme) {
  return theme.words.filter(w => {
    const k = keyFor(w, theme.id);
    const s = score(w, theme.id);
    if (currentFilter === "priority") return s >= 2 || ["grammar","linking-words"].includes(theme.id);
    if (currentFilter === "mastered") return mastered.has(k);
    if (currentFilter === "favorites") return favorites.has(k);
    return true;
  });
}

const LEFT_GROUPS = [
  { label: "✍️ Writing & Grammar", ids: ["grammar","linking-words","phrasal-verbs","writing-task1","writing-task2"] },
  { label: "🌍 Xã hội & Môi trường", ids: ["environment","community","city","countryside"] },
  { label: "📖 Học tập & Công việc", ids: ["education","technology","work","foreign-language"] },
];
const RIGHT_GROUPS = [
  { label: "🏃 Sức khỏe & Thể thao", ids: ["health","sports","food","hobbies"] },
  { label: "🌏 Du lịch & Cuộc sống", ids: ["transport","travel","accommodation","weather","people","art"] },
];

function buildMd(groups) {
  const allThemes = window.VSTEP_VOCAB || [];
  let md = "# &nbsp;\n\n"; // root ẩn
  for (const group of groups) {
    const themes = group.ids.map(id => allThemes.find(t => t.id === id)).filter(Boolean);
    if (!themes.length) continue;
    md += `## ${group.label}\n\n`;
    for (const theme of themes) {
      const words = filtered(theme);
      if (!words.length) continue;
      md += `### ${theme.icon} ${theme.viTitle} (${words.length})\n\n`;
      const high = words.filter(w => score(w, theme.id) >= 6);
      const mid  = words.filter(w => { const s = score(w, theme.id); return s >= 2 && s < 6; });
      const low  = words.filter(w => score(w, theme.id) < 2);
      if (high.length) {
        md += `#### ⭐ Ưu tiên cao\n\n`;
        high.forEach(w => {
          const f = mastered.has(keyFor(w,theme.id)) ? " ✓" : favorites.has(keyFor(w,theme.id)) ? " ★" : "";
          md += `- **${w.en}**${f} — ${w.vi}\n`;
        });
        md += "\n";
      }
      if (mid.length) {
        md += `#### 💡 Nên học\n\n`;
        mid.forEach(w => {
          const f = mastered.has(keyFor(w,theme.id)) ? " ✓" : favorites.has(keyFor(w,theme.id)) ? " ★" : "";
          md += `- ${w.en}${f} — ${w.vi}\n`;
        });
        md += "\n";
      }
      if (low.length) {
        md += `#### 📝 Cốt lõi\n\n`;
        low.forEach(w => {
          const f = mastered.has(keyFor(w,theme.id)) ? " ✓" : favorites.has(keyFor(w,theme.id)) ? " ★" : "";
          md += `- ${w.en}${f} — ${w.vi}\n`;
        });
        md += "\n";
      }
    }
  }
  return md;
}

function speak(text) {
  if (!window.speechSynthesis) return;
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = "en-US"; utt.rate = 0.9;
  if (window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
    setTimeout(() => window.speechSynthesis.speak(utt), 250);
  } else {
    window.speechSynthesis.speak(utt);
  }
}

function bindSpeak(svgEl) {
  svgEl.addEventListener("click", e => {
    const el = e.target.closest("text");
    if (!el) return;
    const content = el.textContent || "";
    const match = content.match(/^[*\s]*([\w\s'',\-\/]+?)\s*[✓★]?\s*—/);
    if (match) speak(match[1].trim().replace(/\*+/g, ""));
  });
}

const OPTS = {
  colorFreezeLevel: 2,
  duration: 300,
  maxWidth: 260,
  initialExpandLevel: 3,
  spacingVertical: 5,
  spacingHorizontal: 65,
  paddingX: 12,
  zoom: true,
  pan: true,
};

function renderSide(svgId, groups, existingMm) {
  const { Transformer, Markmap, loadCSS, loadJS } = window.markmap;
  const transformer = new Transformer();
  const { root, features } = transformer.transform(buildMd(groups));
  const { styles, scripts } = transformer.getUsedAssets(features);
  if (styles) loadCSS(styles);
  if (scripts) loadJS(scripts, { getMarkmap: () => window.markmap });
  const svg = document.getElementById(svgId);
  if (existingMm) {
    existingMm.setData(root);
    setTimeout(() => existingMm.fit(), 300);
    return existingMm;
  } else {
    const mm = Markmap.create(svg, OPTS, root);
    setTimeout(() => mm.fit(), 600);
    bindSpeak(svg);
    return mm;
  }
}

function renderAll() {
  mmLeft  = renderSide("markmap-left",  LEFT_GROUPS,  mmLeft);
  mmRight = renderSide("markmap-right", RIGHT_GROUPS, mmRight);
}

function waitAndRender() {
  if (typeof window.markmap?.Transformer === "function" && window.markmap.Transformer.prototype?.transform) {
    renderAll();
  } else {
    setTimeout(waitAndRender, 100);
  }
}
waitAndRender();

document.querySelectorAll(".chip").forEach(btn => {
  btn.addEventListener("click", () => {
    currentFilter = btn.dataset.filter;
    document.querySelectorAll(".chip").forEach(c => c.classList.toggle("active", c === btn));
    if (mmLeft || mmRight) renderAll();
  });
});
</script>
</body>
</html>
